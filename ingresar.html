<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="Images/logo.png">
	<title>Ingresar - Cronogame</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/main.css">
	<link rel="stylesheet" href="css/typography.css">
	<link rel="stylesheet" href="css/header.css">
	<link rel="stylesheet" href="css/footer.css">
	<link rel="stylesheet" href="css/theme.css">
</head>

<body>

	<header style="position:relative;">
		<div class="top-controls" style="position: absolute; top: 10px; right: 20px; display: flex; gap: 15px; align-items: center; justify-content:flex-end; z-index: 100; width:100%;">
			<button id="theme-toggle" style="position:static;">☀️ Modo Claro</button>
			<div id="header-auth-container"></div>
		</div>
		<h1 style="display:flex; justify-content:center; align-items:center; margin-top:50px;">
			<a href="index.html" class="logo-link" style="display: flex; align-items: center; gap: 15px;">
				<img src="Images/logo.png" alt="Cronogame Logo" class="main-logo">
				<span>Cronogame</span>
			</a>
		</h1>
		
	</header>

	<main class="page-content" style="max-width: 500px; margin: 0 auto; text-align:center;">
		<form id="registroForm" style="background-color:#171717; padding:30px; border-radius:12px; border:1px solid #2a2a2a; text-align:left;" class="light-theme-compatible">
			<h3 style="margin-bottom:10px;">Registro de Usuario</h3>
			<label for="nombre" style="display:block; margin-bottom:8px; font-weight:500;">Nombre de Usuario (Apodo)</label>
			<input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required style="width:100%; box-sizing:border-box; margin-bottom:12px;">

			<label for="correo" style="display:block; margin-bottom:8px; font-weight:500;">Correo electrónico</label>
			<input type="email" id="correo" name="correo" placeholder="Correo electrónico" required style="width:100%; box-sizing:border-box; margin-bottom:12px;">

			<label for="direccion" style="display:block; margin-bottom:8px; font-weight:500;">Dirección</label>
			<input type="text" id="direccion" name="direccion" placeholder="Dirección" style="width:100%; box-sizing:border-box; margin-bottom:12px;">

			<label for="password" style="display:block; margin-bottom:8px; font-weight:500;">Contraseña</label>
			<input type="password" id="password" name="password" placeholder="Contraseña" required style="width:100%; box-sizing:border-box; margin-bottom:20px;">

			<button type="submit" style="width:100%; box-sizing:border-box; font-size:1.1rem; padding:15px;">Registrarse</button>
			<p id="mensaje" style="margin-top:12px;"></p>
		</form>
	</main>

	<footer>
		<div class="footer-info">
			<p>&copy; 2026 Cronogame. Todos los derechos reservados.</p>
		</div>
		<div class="footer-links">
			<a href="contacto.html">Contacto</a>
			<a href="terminos.html">Términos de servicio</a>
			<a href="privacidad.html">Política de privacidad</a>
		</div>
	</footer>
	<script src="js/theme.js"></script>
	<script src="js/app.js"></script>
</body>

</html>
