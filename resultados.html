<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Images/logo.png">
    <title>Más Resultados - Cronogame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>

    <header style="position:relative;">
        <div class="top-controls" style="position: absolute; top: 10px; right: 20px; display: flex; gap: 15px; align-items: center; justify-content:flex-end; z-index: 100; width:100%;">
            <button id="theme-toggle" style="position:static;">☀️ Modo Claro</button>
            <div id="header-auth-container"></div>
        </div>
        <h1 style="display:flex; justify-content:center; align-items:center; margin-top:50px;">
            <a href="index.html" class="logo-link" style="display: flex; align-items: center; gap: 15px;">
                <img src="Images/logo.png" alt="Cronogame Logo" class="main-logo">
                <span>Cronogame</span>
            </a>
        </h1>
        <p>Resultados extendidos de la búsqueda</p>
    </header>

    <main class="page-content" style="max-width: 900px; margin: 0 auto; box-sizing: border-box;">
        <h2 id="search-title" style="margin-bottom: 30px; text-align: center;">Cargando...</h2>
        
        <div id="resultados-list" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="spinner-container">
                <div class="loader"></div>
                <p style="margin-top: 15px;">Recopilando biblioteca de juegos...</p>
            </div>
        </div>

        <div style="margin-top: 50px; text-align: center;">
            <a href="index.html" style="display:inline-block; padding:12px 24px; border:1px solid #e0e0e0; color: inherit; text-decoration:none; border-radius:6px; font-weight: 500; transition:all 0.2s;">⬅️ Volver al buscador principal</a>
        </div>
    </main>

    <footer>
        <div class="footer-info">
            <p>&copy; 2026 Cronogame. Todos los derechos reservados.</p>
        </div>
        <div class="footer-links">
            <a href="contacto.html">Contacto</a>
            <a href="terminos.html">Términos de servicio</a>
            <a href="privacidad.html">Política de privacidad</a>
        </div>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/listas.js"></script>
    <script src="js/resultados.js"></script>
</body>
</html>
